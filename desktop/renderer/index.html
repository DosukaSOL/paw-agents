<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self';">
  <title>PAW Agents</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #08080d;
      --bg-secondary: #0e0e16;
      --bg-card: #13131f;
      --bg-card-hover: #1a1a2e;
      --bg-elevated: #1e1e32;
      --border-subtle: rgba(124, 58, 237, 0.12);
      --border-standard: rgba(124, 58, 237, 0.2);
      --border-bright: rgba(124, 58, 237, 0.35);
      --text-primary: #f0eef5;
      --text-secondary: #a8a4b8;
      --text-tertiary: #6b6880;
      --brand: #7c3aed;
      --brand-light: #a78bfa;
      --brand-dark: #6d28d9;
      --brand-glow: rgba(124, 58, 237, 0.15);
      --accent: #22d3ee;
      --success: #34d399;
      --warning: #fbbf24;
      --error: #f87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }
    .titlebar {
      height: 38px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--error);
      margin-right: 8px;
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--success); }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      -webkit-app-region: no-drag;
    }
    .message {
      max-width: 80%;
      margin-bottom: 16px;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .message.user {
      background: var(--brand);
      color: #fff;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .message.agent {
      background: var(--bg-card);
      border: 1px solid var(--border-standard);
      border-bottom-left-radius: 4px;
    }
    .input-area {
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      gap: 12px;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border-standard);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: var(--brand-light); }
    .input-area input::placeholder { color: var(--text-tertiary); }
    .input-area button {
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px var(--brand-glow);
    }
    .input-area button:hover { opacity: 0.9; box-shadow: 0 0 30px rgba(124, 58, 237, 0.3); }
    .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="status-dot" id="statusDot"></span>
    <img src="../icon.png" alt="" style="width:18px;height:18px;margin-right:6px;filter:drop-shadow(0 0 4px rgba(124,58,237,0.4));" />
    <span>PAW Agents</span>
  </div>

  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Message PAW..." autocomplete="off" />
    <button id="send">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusDot = document.getElementById('statusDot');

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      sendBtn.disabled = true;

      try {
        await window.paw.send(text);
      } catch (err) {
        addMessage('Failed to send message. Check connection.', 'agent');
      }

      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });

    // Listen for messages from PAW
    window.paw.onMessage((msg) => {
      if (msg && msg.payload && msg.payload.text) {
        addMessage(msg.payload.text, 'agent');
      } else if (msg && msg.message) {
        addMessage(msg.message, 'agent');
      }
    });

    // Connection status
    window.paw.onStatus((status) => {
      if (status === 'connected') {
        statusDot.classList.add('connected');
      } else {
        statusDot.classList.remove('connected');
      }
    });

    // Initial status check
    window.paw.status().then((s) => {
      if (s.connected) statusDot.classList.add('connected');
    });

    // Welcome message
    addMessage('🐾 Welcome to PAW Agents Desktop! Type a message to get started.', 'agent');

    input.focus();
  </script>
</body>
</html>
